name: Build Windows Executable

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: |
          pyinstaller --onedir --windowed --name BridgeRoutePlanner --add-data "M4T_v2_simple.stl;." --add-data "cable_stayed_bridge.stl;." main.py

      - name: Zip output folder
        run: |
          Compress-Archive -Path dist\BridgeRoutePlanner\* -DestinationPath dist\BridgeRoutePlanner.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BridgeRoutePlanner
          path: dist/BridgeRoutePlanner.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BridgeRoutePlanner.zip
